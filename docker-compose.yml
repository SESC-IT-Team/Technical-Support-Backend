services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_app
    ports:
      - "8123:8123"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5429:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
